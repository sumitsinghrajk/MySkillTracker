name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/MySkillTracker

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Detect changed files
            CHANGED_FILES=$(git diff --name-only HEAD@{1} HEAD || true)

            echo "Changed files:"
            echo "$CHANGED_FILES"

            # Backend changed → update backend only
            if echo "$CHANGED_FILES" | grep -q "^backend/"; then
              echo "Backend changed → deploying backend"
              docker-compose pull backend
              docker-compose up -d --no-deps backend
            fi

            # Frontend or nginx config changed → reload nginx only
            if echo "$CHANGED_FILES" | grep -q "^frontend/\|^nginx/"; then
              echo "Frontend/Nginx changed → restarting nginx"
              docker-compose up -d --no-deps nginx
            fi

            # Cleanup
            docker image prune -f